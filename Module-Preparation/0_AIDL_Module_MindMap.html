<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artificial Intelligence & Deep Learning — Module Mind Map</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0d1b2a;
    --navy-mid: #112236;
    --navy-light: #1a3352;
    --teal: #2dd4bf;
    --teal-dim: #1a9e8f;
    --gold: #f0b429;
    --gold-dim: #b8831a;
    --coral: #f97316;
    --white: #f0f4f8;
    --muted: #8bacc4;
    --group-color: #2dd4bf;
    --individual-color: #f0b429;
    --wk1-color: #6ee7b7;
    --wk1-bg: rgba(110,231,183,0.08);
    --wk1-border: rgba(110,231,183,0.28);
    --wk2-color: #818cf8;
    --wk2-bg: rgba(129,140,248,0.08);
    --wk2-border: rgba(129,140,248,0.28);
    --wk3-color: #fb923c;
    --wk3-bg: rgba(251,146,60,0.08);
    --wk3-border: rgba(251,146,60,0.28);
    --wk4-color: #f472b6;
    --wk4-bg: rgba(244,114,182,0.08);
    --wk4-border: rgba(244,114,182,0.28);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--navy);
    color: var(--white);
    font-family: 'Crimson Pro', Georgia, serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* === HEADER === */
  header {
    padding: 2.5rem 3rem 1.5rem;
    border-bottom: 1px solid rgba(45,212,191,0.15);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 2rem;
  }

  .header-left h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(1.4rem, 3vw, 2.2rem);
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1.1;
    color: var(--white);
  }

  .header-left h1 span {
    color: var(--teal);
  }

  .header-left p {
    margin-top: 0.4rem;
    font-size: 1rem;
    color: var(--muted);
    font-style: italic;
  }

  .legend {
    display: flex;
    gap: 1.5rem;
    align-items: center;
    flex-shrink: 0;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-family: 'Syne', sans-serif;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .legend-item:hover { opacity: 0.7; }

  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
  }

  .legend-dot.group { background: var(--group-color); box-shadow: 0 0 8px var(--group-color); }
  .legend-dot.individual { background: var(--individual-color); box-shadow: 0 0 8px var(--individual-color); }

  /* === INSTRUCTION BAR === */
  .instruction-bar {
    padding: 0.7rem 3rem;
    background: rgba(45,212,191,0.05);
    border-bottom: 1px solid rgba(45,212,191,0.08);
    font-size: 0.82rem;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    letter-spacing: 0.03em;
    display: flex;
    align-items: center;
    gap: 1.5rem;
  }

  .instruction-bar span { display: flex; align-items: center; gap: 0.4rem; }
  .instruction-bar .icon { font-size: 1rem; }

  /* === MAIN MAP AREA === */
  .map-container {
    position: relative;
    width: 100%;
    padding: 2rem 0 3rem;
  }

  #map-svg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 1;
  }

  .columns {
    display: grid;
    grid-template-columns: 110px 1fr 1fr 200px;
    gap: 0;
    position: relative;
    z-index: 2;
    padding: 0 3rem;
    align-items: start;
  }

  /* === WEEK COLUMN === */
  .weeks-col {
    display: flex;
    flex-direction: column;
    padding-top: 1rem;
  }

  .week-bracket {
    display: flex;
    align-items: flex-start;
    gap: 0.6rem;
    margin-bottom: 0;
    transition: all 0.3s;
  }

  .week-number {
    font-family: 'Syne', sans-serif;
    font-size: 2.8rem;
    font-weight: 800;
    color: var(--navy-light);
    line-height: 1;
    transition: color 0.3s;
    min-width: 48px;
    text-align: right;
  }

  .week-bracket.wk1 .week-number { color: var(--wk1-color); }
  .week-bracket.wk2 .week-number { color: var(--wk2-color); }
  .week-bracket.wk3 .week-number { color: var(--wk3-color); }
  .week-bracket.wk4 .week-number { color: var(--wk4-color); }
  .week-bracket.wk1 .week-brace { color: rgba(110,231,183,0.3); }
  .week-bracket.wk2 .week-brace { color: rgba(129,140,248,0.3); }
  .week-bracket.wk3 .week-brace { color: rgba(251,146,60,0.3); }
  .week-bracket.wk4 .week-brace { color: rgba(244,114,182,0.3); }

  .week-brace {
    font-size: 4rem;
    color: var(--navy-light);
    line-height: 1;
    font-family: Georgia, serif;
    font-weight: 100;
    transition: color 0.3s;
    margin-top: -0.3rem;
  }

  .week-bracket:hover .week-brace,
  .week-bracket.highlighted .week-brace {
    color: var(--teal);
  }

  /* === TOPICS COLUMN === */
  .topics-col {
    display: flex;
    flex-direction: column;
    gap: 0;
    padding-right: 1rem;
  }

  .topic-node {
    position: relative;
    margin: 0.6rem 0;
    cursor: pointer;
    transition: all 0.25s;
  }

  .topic-inner {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    padding: 0.75rem 1.1rem;
    border-radius: 8px;
    border: 1px solid rgba(139,172,196,0.15);
    background: rgba(17,34,54,0.6);
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
  }

  .topic-inner::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(45,212,191,0.03));
    opacity: 0;
    transition: opacity 0.25s;
  }

  .topic-node:hover .topic-inner,
  .topic-node.active .topic-inner {
    border-color: rgba(45,212,191,0.4);
    background: rgba(26,51,82,0.9);
    transform: translateX(4px);
  }

  .topic-node:hover .topic-inner::before,
  .topic-node.active .topic-inner::before {
    opacity: 1;
  }

  .topic-node.dimmed .topic-inner {
    opacity: 0.3;
    transform: none;
  }

  .topic-node.highlighted-group .topic-inner {
    border-color: rgba(45,212,191,0.6);
    background: rgba(45,212,191,0.08);
    box-shadow: 0 0 20px rgba(45,212,191,0.1), inset 0 0 20px rgba(45,212,191,0.05);
  }

  .topic-node.highlighted-individual .topic-inner {
    border-color: rgba(240,180,41,0.6);
    background: rgba(240,180,41,0.08);
    box-shadow: 0 0 20px rgba(240,180,41,0.1), inset 0 0 20px rgba(240,180,41,0.05);
  }

  .topic-node.highlighted-both .topic-inner {
    border-color: rgba(249,115,22,0.6);
    background: rgba(249,115,22,0.07);
    box-shadow: 0 0 20px rgba(249,115,22,0.1);
  }

  .topic-tag {
    font-family: 'Syne', sans-serif;
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0.15rem 0.45rem;
    border-radius: 3px;
    flex-shrink: 0;
  }

  .tag-w1 { background: rgba(110,231,183,0.2); color: var(--wk1-color); }
  .tag-w2 { background: rgba(129,140,248,0.2); color: var(--wk2-color); }
  .tag-w3 { background: rgba(251,146,60,0.2);  color: var(--wk3-color); }
  .tag-w4 { background: rgba(244,114,182,0.2); color: var(--wk4-color); }

  /* Week-coloured card backgrounds */
  .topic-node.wk1 .topic-inner { border-color: var(--wk1-border); background: var(--wk1-bg); }
  .topic-node.wk2 .topic-inner { border-color: var(--wk2-border); background: var(--wk2-bg); }
  .topic-node.wk3 .topic-inner { border-color: var(--wk3-border); background: var(--wk3-bg); }
  .topic-node.wk4 .topic-inner { border-color: var(--wk4-border); background: var(--wk4-bg); }

  .topic-node.wk1:hover .topic-inner, .topic-node.wk1.active .topic-inner { border-color: var(--wk1-color); box-shadow: 0 0 18px rgba(110,231,183,0.15); }
  .topic-node.wk2:hover .topic-inner, .topic-node.wk2.active .topic-inner { border-color: var(--wk2-color); box-shadow: 0 0 18px rgba(129,140,248,0.15); }
  .topic-node.wk3:hover .topic-inner, .topic-node.wk3.active .topic-inner { border-color: var(--wk3-color); box-shadow: 0 0 18px rgba(251,146,60,0.15); }
  .topic-node.wk4:hover .topic-inner, .topic-node.wk4.active .topic-inner { border-color: var(--wk4-color); box-shadow: 0 0 18px rgba(244,114,182,0.15); }

  /* Week key strip */
  .week-key {
    display: flex;
    gap: 0.6rem;
    align-items: center;
    flex-wrap: wrap;
  }
  .week-key-item {
    display: flex;
    align-items: center;
    gap: 0.35rem;
    font-family: 'Syne', sans-serif;
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .week-key-item:hover { opacity: 0.7; }
  .week-key-swatch {
    width: 10px; height: 10px;
    border-radius: 3px;
  }

  .topic-name {
    font-size: 0.95rem;
    font-weight: 400;
    color: var(--white);
    line-height: 1.3;
  }

  .topic-name strong {
    font-weight: 600;
  }

  .topic-node .connector-badges {
    display: flex;
    gap: 0.3rem;
    margin-left: auto;
    flex-shrink: 0;
  }

  .badge {
    width: 7px; height: 7px;
    border-radius: 50%;
    opacity: 0.6;
  }
  .badge.group { background: var(--group-color); }
  .badge.individual { background: var(--individual-color); }

  /* spacer between topics */
  .topic-spacer {
    height: 2.2rem;
  }

  /* === SPACER COL === */
  .spacer-col { /* empty middle column for SVG lines */ }

  /* === ASSESSMENTS COLUMN === */
  .assessments-col {
    display: flex;
    flex-direction: column;
    gap: 3rem;
    padding-top: 1rem;
    padding-left: 1rem;
  }

  .assessment-card {
    position: relative;
    cursor: pointer;
    transition: all 0.25s;
  }

  .assessment-inner {
    padding: 1.2rem 1.4rem;
    border-radius: 10px;
    border: 2px solid;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }

  .assessment-inner::after {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 3px;
    height: 100%;
    border-radius: 0 10px 10px 0;
    transition: all 0.3s;
  }

  .assessment-card.group-card .assessment-inner {
    border-color: rgba(45,212,191,0.3);
    background: rgba(45,212,191,0.05);
  }
  .assessment-card.group-card .assessment-inner::after {
    background: var(--group-color);
    box-shadow: 0 0 12px var(--group-color);
  }
  .assessment-card.individual-card .assessment-inner {
    border-color: rgba(240,180,41,0.3);
    background: rgba(240,180,41,0.05);
  }
  .assessment-card.individual-card .assessment-inner::after {
    background: var(--individual-color);
    box-shadow: 0 0 12px var(--individual-color);
  }

  .assessment-card.group-card:hover .assessment-inner,
  .assessment-card.group-card.active .assessment-inner {
    border-color: rgba(45,212,191,0.7);
    background: rgba(45,212,191,0.12);
    transform: translateX(-4px);
    box-shadow: -8px 0 30px rgba(45,212,191,0.15);
  }
  .assessment-card.individual-card:hover .assessment-inner,
  .assessment-card.individual-card.active .assessment-inner {
    border-color: rgba(240,180,41,0.7);
    background: rgba(240,180,41,0.12);
    transform: translateX(-4px);
    box-shadow: -8px 0 30px rgba(240,180,41,0.15);
  }

  .assessment-type {
    font-family: 'Syne', sans-serif;
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 0.3rem;
  }
  .group-card .assessment-type { color: var(--teal); }
  .individual-card .assessment-type { color: var(--gold); }

  .assessment-title {
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    line-height: 1.2;
    margin-bottom: 0.5rem;
  }

  .assessment-desc {
    font-size: 0.8rem;
    color: var(--muted);
    line-height: 1.5;
    font-style: italic;
  }

  .topic-count {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-top: 0.6rem;
    font-family: 'Syne', sans-serif;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: var(--navy);
    padding: 0.2rem 0.5rem;
    border-radius: 20px;
  }
  .group-card .topic-count { background: var(--teal); }
  .individual-card .topic-count { background: var(--gold); }

  /* === SVG LINES === */
  .connection-line {
    fill: none;
    stroke-width: 1.5;
    transition: all 0.3s;
    opacity: 0.25;
  }

  .connection-line.group-line { stroke: var(--group-color); }
  .connection-line.individual-line { stroke: var(--individual-color); }

  .connection-line.highlighted {
    opacity: 0.9;
    stroke-width: 2.5;
    filter: drop-shadow(0 0 4px currentColor);
  }

  .connection-line.dimmed {
    opacity: 0.05;
  }

  /* === TOOLTIP === */
  #tooltip {
    position: fixed;
    pointer-events: none;
    background: var(--navy-light);
    border: 1px solid rgba(45,212,191,0.3);
    border-radius: 8px;
    padding: 0.7rem 1rem;
    font-family: 'Crimson Pro', serif;
    font-size: 0.9rem;
    color: var(--white);
    max-width: 220px;
    z-index: 999;
    opacity: 0;
    transition: opacity 0.2s;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    line-height: 1.5;
  }

  #tooltip.visible { opacity: 1; }
  #tooltip strong { color: var(--teal); font-weight: 600; display: block; margin-bottom: 0.2rem; }

  /* === FOOTER === */
  footer {
    padding: 1.5rem 3rem;
    border-top: 1px solid rgba(45,212,191,0.1);
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-family: 'Syne', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.05em;
    color: rgba(139,172,196,0.5);
    text-transform: uppercase;
  }

  /* === PULSE ANIMATION on load === */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes drawLine {
    from { stroke-dashoffset: 1000; }
    to { stroke-dashoffset: 0; }
  }

  .topic-node {
    animation: fadeInUp 0.5s both;
  }

  .assessment-card {
    animation: fadeInUp 0.5s both;
  }

  .topic-node:nth-child(1) { animation-delay: 0.1s; }
  .topic-node:nth-child(2) { animation-delay: 0.18s; }
  .topic-node:nth-child(3) { animation-delay: 0.26s; }
  .topic-node:nth-child(4) { animation-delay: 0.34s; }
  .topic-node:nth-child(5) { animation-delay: 0.42s; }
  .topic-node:nth-child(6) { animation-delay: 0.50s; }
  .topic-node:nth-child(7) { animation-delay: 0.58s; }

  .assessment-card:nth-child(1) { animation-delay: 0.65s; }
  .assessment-card:nth-child(2) { animation-delay: 0.75s; }

  /* Glow pulse on assessment cards */
  @keyframes glow-teal {
    0%, 100% { box-shadow: -4px 0 16px rgba(45,212,191,0.05); }
    50% { box-shadow: -4px 0 28px rgba(45,212,191,0.2); }
  }
  @keyframes glow-gold {
    0%, 100% { box-shadow: -4px 0 16px rgba(240,180,41,0.05); }
    50% { box-shadow: -4px 0 28px rgba(240,180,41,0.2); }
  }

  .group-card .assessment-inner { animation: glow-teal 4s ease-in-out infinite; }
  .individual-card .assessment-inner { animation: glow-gold 4s ease-in-out 1s infinite; }

  /* === Reset button === */
  #reset-btn {
    font-family: 'Syne', sans-serif;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    background: transparent;
    border: 1px solid rgba(139,172,196,0.2);
    padding: 0.35rem 0.8rem;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
    display: none;
  }
  #reset-btn.visible { display: block; }
  #reset-btn:hover { color: var(--white); border-color: rgba(139,172,196,0.5); }

  /* === WEEK HEIGHT SPACERS === */
  .week-topics-group {
    display: contents;
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Artificial Intelligence & Deep Learning — <span>Module Mind Map</span></h1>
    <p>MSc Applied AI &nbsp;·&nbsp; WMG, University of Warwick</p>
  </div>
  <div style="display:flex;align-items:center;gap:2rem;">
    <button id="reset-btn">✕ Clear</button>
    <div class="legend">
      <div class="legend-item" onclick="highlightAssessment('group')">
        <div class="legend-dot group"></div>
        Group Assessment
      </div>
      <div class="legend-item" onclick="highlightAssessment('individual')">
        <div class="legend-dot individual"></div>
        Individual Assessment
      </div>
    </div>
  </div>
</header>

<div class="instruction-bar">
  <span><span class="icon">◎</span> Hover over a topic or assessment to highlight its connections</span>
  <span><span class="icon">◈</span> Click to lock the selection</span>
  <span style="margin-left:auto;">
    <div class="week-key">
      <div class="week-key-item"><div class="week-key-swatch" style="background:#6ee7b7;"></div>Week 1</div>
      <div class="week-key-item"><div class="week-key-swatch" style="background:#818cf8;"></div>Week 2</div>
      <div class="week-key-item"><div class="week-key-swatch" style="background:#fb923c;"></div>Week 3</div>
      <div class="week-key-item"><div class="week-key-swatch" style="background:#f472b6;"></div>Week 4</div>
    </div>
  </span>
</div>

<div class="map-container" id="map-container">
  <svg id="map-svg" xmlns="http://www.w3.org/2000/svg"></svg>

  <div class="columns">
    <!-- WEEKS COLUMN -->
    <div class="weeks-col" id="weeks-col">
      <!-- Populated by JS -->
    </div>

    <!-- TOPICS COLUMN -->
    <div class="topics-col" id="topics-col">
      <!-- Populated by JS -->
    </div>

    <!-- SPACER -->
    <div class="spacer-col"></div>

    <!-- ASSESSMENTS COLUMN -->
    <div class="assessments-col" id="assessments-col">
      <!-- Populated by JS -->
    </div>
  </div>
</div>

<footer></footer>

<div id="tooltip"></div>

<script>
// ============================================================
//  DATA
// ============================================================
const weeks = [
  { id: 'w1', label: '1', topics: ['t1','t2','t3'] },
  { id: 'w2', label: '2', topics: ['t4','t5'] },
  { id: 'w3', label: '3', topics: ['t6'] },
  { id: 'w4', label: '4', topics: ['t7'] },
];

const topics = [
  {
    id: 't1', week: 'w1',
    name: '<strong>Traditional ML</strong> vs Deep Learning',
    shortName: 'Traditional ML vs Deep Learning',
    assessments: ['individual'],
    detail: 'Foundational comparison: classical ML pipelines vs. end-to-end deep learning. Core context for your Individual Assessment.'
  },
  {
    id: 't2', week: 'w1',
    name: '<strong>Artificial Neural Networks</strong> (ANNs)',
    shortName: 'Artificial Neural Networks (ANNs)',
    assessments: ['group', 'individual'],
    detail: 'Perceptrons, activation functions, gradient descent, and forward propagation. Core theory underpinning both assessments.'
  },
  {
    id: 't3', week: 'w1',
    name: '<strong>Multi-Layer Perceptron</strong> (MLP)',
    shortName: 'Multi-Layer Perceptron (MLP)',
    assessments: ['group', 'individual'],
    detail: 'Architecture, hidden layers, and backpropagation. Can be useful for both group and individual assessments.'
  },
  {
    id: 't4', week: 'w2',
    name: '<strong>Convolutional Neural Networks</strong> (CNNs)',
    shortName: 'Convolutional Neural Networks (CNNs)',
    assessments: ['group', 'individual'],
    detail: 'Architecture, filters, pooling, and feature maps. Can be useful for both group and individual assessments.'
  },
  {
    id: 't5', week: 'w2',
    name: '<strong>RNNs</strong> & LSTM',
    shortName: 'RNNs & LSTM',
    assessments: ['group', 'individual'],
    detail: 'Sequence modelling. Can be useful for both group and individual assessments.'
  },
  {
    id: 't6', week: 'w3',
    name: '<strong>Transformers</strong> and LLMs',
    shortName: 'Transformers and LLMs',
    assessments: ['group', 'individual'],
    detail: 'Attention mechanisms, LLM models. Can be useful for both group and individual assessments.'
  },
  {
    id: 't7', week: 'w4',
    name: '<strong>RAG Systems</strong>',
    shortName: 'RAG Systems',
    assessments: ['individual'],
    detail: 'Combining Retrieval with Generative models. Can be useful for your individual assessment.'
  },
];

const assessments = [
  {
    id: 'group',
    type: 'Group',
    title: 'Group Assessment',
    desc: 'Collaborative applied project demonstrating deep learning solutions using weeks 1–2 content',
    cardClass: 'group-card',
  },
  {
    id: 'individual',
    type: 'Individual',
    title: 'Individual Assessment',
    desc: 'Comprehensive individual work spanning all four weeks of neural network and generative AI topics',
    cardClass: 'individual-card',
  },
];

// ============================================================
//  BUILD DOM
// ============================================================
let activeFilter = null; // 'group' | 'individual' | topicId | null
let locked = false;

function buildDOM() {
  buildWeeks();
  buildTopics();
  buildAssessments();
}

function buildWeeks() {
  const col = document.getElementById('weeks-col');
  // We need week brackets that visually span their topics
  // We'll position them absolutely after layout — for now build as flex items
  weeks.forEach(w => {
    const el = document.createElement('div');
    el.className = 'week-bracket wk' + w.label;
    el.id = 'week-' + w.id;
    el.innerHTML = `
      <div class="week-number">${w.label}</div>
      <div class="week-brace"></div>
    `;
    col.appendChild(el);
  });
}

function buildTopics() {
  const col = document.getElementById('topics-col');
  topics.forEach(t => {
    const weekObj = weeks.find(w => w.id === t.week);
    const weekNum = weekObj ? weekObj.label : '?';
    const badges = t.assessments.map(a => `<div class="badge ${a}"></div>`).join('');

    const el = document.createElement('div');
    el.className = 'topic-node wk' + weekNum;
    el.id = 'topic-' + t.id;
    el.dataset.topic = t.id;
    el.innerHTML = `
      <div class="topic-inner">
        <div class="topic-tag tag-w${weekNum}">Wk ${weekNum}</div>
        <div class="topic-name">${t.name}</div>
        <div class="connector-badges">${badges}</div>
      </div>
    `;

    el.addEventListener('mouseenter', () => { if (!locked) handleTopicHover(t.id); showTooltip(el, t); });
    el.addEventListener('mouseleave', () => { if (!locked) clearHighlight(); hideTooltip(); });
    el.addEventListener('click', () => toggleLock('topic', t.id));

    col.appendChild(el);

    // Add spacer after w1 and w2 topics
    if (t.id === 't3' || t.id === 't5') {
      const sp = document.createElement('div');
      sp.className = 'topic-spacer';
      col.appendChild(sp);
    }
  });
}

function buildAssessments() {
  const col = document.getElementById('assessments-col');
  assessments.forEach(a => {
    const topicCount = topics.filter(t => t.assessments.includes(a.id)).length;
    const el = document.createElement('div');
    el.className = `assessment-card ${a.cardClass}`;
    el.id = 'assess-' + a.id;
    el.dataset.assessment = a.id;
    el.innerHTML = `
      <div class="assessment-inner">
        <div class="assessment-type">${a.type}</div>
        <div class="assessment-title">${a.title}</div>
        <div class="assessment-desc">${a.desc}</div>
        <div class="topic-count">${topicCount} contributing topics</div>
      </div>
    `;

    el.addEventListener('mouseenter', () => { if (!locked) { highlightAssessment(a.id); } showAssessTooltip(el, a); });
    el.addEventListener('mouseleave', () => { if (!locked) clearHighlight(); hideTooltip(); });
    el.addEventListener('click', () => toggleLock('assessment', a.id));
    col.appendChild(el);
  });
}

// ============================================================
//  SVG LINES
// ============================================================
function drawLines() {
  const svg = document.getElementById('map-svg');
  const container = document.getElementById('map-container');
  const containerRect = container.getBoundingClientRect();

  svg.innerHTML = '';
  svg.setAttribute('viewBox', `0 0 ${containerRect.width} ${containerRect.height}`);

  // For each topic→assessment connection, draw a bezier
  topics.forEach(t => {
    const topicEl = document.getElementById('topic-' + t.id);
    if (!topicEl) return;
    const topicRect = topicEl.getBoundingClientRect();
    const startX = topicRect.right - containerRect.left;
    const startY = topicRect.top + topicRect.height / 2 - containerRect.top;

    t.assessments.forEach(aId => {
      const assessEl = document.getElementById('assess-' + aId);
      if (!assessEl) return;
      const assessRect = assessEl.getBoundingClientRect();
      const endX = assessRect.left - containerRect.left;
      const endY = assessRect.top + assessRect.height / 2 - containerRect.top;

      const cp1x = startX + (endX - startX) * 0.4;
      const cp1y = startY;
      const cp2x = startX + (endX - startX) * 0.6;
      const cp2y = endY;

      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', `M ${startX} ${startY} C ${cp1x} ${cp1y}, ${cp2x} ${cp2y}, ${endX} ${endY}`);
      path.setAttribute('class', `connection-line ${aId}-line`);
      path.setAttribute('data-topic', t.id);
      path.setAttribute('data-assessment', aId);
      path.setAttribute('stroke-dasharray', '1000');
      path.setAttribute('stroke-dashoffset', '0');
      svg.appendChild(path);

      // Animate in
      const delay = (topics.indexOf(t) * 0.07 + 0.8) * 1000;
      path.style.opacity = '0';
      setTimeout(() => {
        path.style.transition = 'opacity 0.5s';
        path.style.opacity = '0.25';
      }, delay);
    });
  });
}

// ============================================================
//  HIGHLIGHT LOGIC
// ============================================================
function handleTopicHover(topicId) {
  const t = topics.find(x => x.id === topicId);
  if (!t) return;

  // Dim all topics
  topics.forEach(x => {
    const el = document.getElementById('topic-' + x.id);
    el.classList.remove('active','highlighted-group','highlighted-individual','highlighted-both','dimmed');
    if (x.id === topicId) {
      el.classList.add('active');
      // Add highlight classes based on assessments
      if (t.assessments.includes('group') && t.assessments.includes('individual')) {
        el.classList.add('highlighted-both');
      } else if (t.assessments.includes('group')) {
        el.classList.add('highlighted-group');
      } else {
        el.classList.add('highlighted-individual');
      }
    } else {
      el.classList.add('dimmed');
    }
  });

  // Highlight assessments
  assessments.forEach(a => {
    const el = document.getElementById('assess-' + a.id);
    el.classList.remove('active');
    if (t.assessments.includes(a.id)) el.classList.add('active');
  });

  // Lines
  document.querySelectorAll('.connection-line').forEach(line => {
    line.classList.remove('highlighted','dimmed');
    if (line.dataset.topic === topicId) {
      line.classList.add('highlighted');
    } else {
      line.classList.add('dimmed');
    }
  });
}

function highlightAssessment(assessId) {
  const relatedTopics = topics.filter(t => t.assessments.includes(assessId)).map(t => t.id);

  topics.forEach(t => {
    const el = document.getElementById('topic-' + t.id);
    el.classList.remove('active','highlighted-group','highlighted-individual','highlighted-both','dimmed');
    if (relatedTopics.includes(t.id)) {
      el.classList.add(assessId === 'group' ? 'highlighted-group' : 'highlighted-individual');
    } else {
      el.classList.add('dimmed');
    }
  });

  assessments.forEach(a => {
    const el = document.getElementById('assess-' + a.id);
    el.classList.remove('active');
    if (a.id === assessId) el.classList.add('active');
  });

  document.querySelectorAll('.connection-line').forEach(line => {
    line.classList.remove('highlighted','dimmed');
    if (line.dataset.assessment === assessId) {
      line.classList.add('highlighted');
    } else {
      line.classList.add('dimmed');
    }
  });

  if (!locked) {
    locked = true;
    activeFilter = { type: 'assessment', id: assessId };
    document.getElementById('reset-btn').classList.add('visible');
  }
}

function clearHighlight() {
  topics.forEach(t => {
    const el = document.getElementById('topic-' + t.id);
    el.classList.remove('active','highlighted-group','highlighted-individual','highlighted-both','dimmed');
  });
  assessments.forEach(a => {
    const el = document.getElementById('assess-' + a.id);
    el.classList.remove('active');
  });
  document.querySelectorAll('.connection-line').forEach(line => {
    line.classList.remove('highlighted','dimmed');
  });
}

function toggleLock(type, id) {
  if (locked && activeFilter && activeFilter.type === type && activeFilter.id === id) {
    locked = false;
    activeFilter = null;
    clearHighlight();
    document.getElementById('reset-btn').classList.remove('visible');
  } else {
    locked = true;
    activeFilter = { type, id };
    if (type === 'topic') handleTopicHover(id);
    else highlightAssessment(id);
    document.getElementById('reset-btn').classList.add('visible');
  }
}

document.getElementById('reset-btn').addEventListener('click', () => {
  locked = false;
  activeFilter = null;
  clearHighlight();
  document.getElementById('reset-btn').classList.remove('visible');
});

// ============================================================
//  TOOLTIP
// ============================================================
const tooltip = document.getElementById('tooltip');

function showTooltip(el, t) {
  const aLabels = t.assessments.map(a => a === 'group' ? '🟢 Group' : '🟡 Individual').join(' &nbsp;·&nbsp; ');
  tooltip.innerHTML = `<strong>${t.shortName}</strong>${t.detail}<br><br>${aLabels}`;
  tooltip.classList.add('visible');
}

function showAssessTooltip(el, a) {
  const relatedTopics = topics.filter(t => t.assessments.includes(a.id));
  const topicList = relatedTopics.map(t => `· ${t.shortName}`).join('<br>');
  tooltip.innerHTML = `<strong>${a.title}</strong>Draws from:<br>${topicList}`;
  tooltip.classList.add('visible');
}

function hideTooltip() {
  tooltip.classList.remove('visible');
}

document.addEventListener('mousemove', e => {
  const x = e.clientX;
  const y = e.clientY;
  const tw = tooltip.offsetWidth;
  const th = tooltip.offsetHeight;
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const left = x + 15 + tw > vw ? x - tw - 15 : x + 15;
  const top = y + 15 + th > vh ? y - th - 10 : y + 15;
  tooltip.style.left = left + 'px';
  tooltip.style.top = top + 'px';
});

// ============================================================
//  WEEK BRACKET VERTICAL ALIGNMENT
// ============================================================
function alignWeekBrackets() {
  weeks.forEach(w => {
    const firstTopic = document.getElementById('topic-' + w.topics[0]);
    const lastTopic = document.getElementById('topic-' + w.topics[w.topics.length - 1]);
    const weekEl = document.getElementById('week-' + w.id);
    if (!firstTopic || !lastTopic || !weekEl) return;

    const colTop = document.getElementById('topics-col').getBoundingClientRect().top;
    const firstRect = firstTopic.getBoundingClientRect();
    const lastRect = lastTopic.getBoundingClientRect();

    const centerY = (firstRect.top + lastRect.bottom) / 2 - colTop;
    weekEl.style.position = 'absolute';
    weekEl.style.top = (centerY - 30) + 'px';
  });
}

// ============================================================
//  INIT
// ============================================================
window.addEventListener('DOMContentLoaded', () => {
  buildDOM();
  // Wait for layout
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      drawLines();
      // Position week col
      positionWeekCol();
    });
  });
});

function positionWeekCol() {
  const weeksCol = document.getElementById('weeks-col');
  const topicsCol = document.getElementById('topics-col');
  const containerRect = document.getElementById('map-container').getBoundingClientRect();

  weeksCol.style.position = 'relative';

  weeks.forEach(w => {
    const firstTopic = document.getElementById('topic-' + w.topics[0]);
    const lastTopic = document.getElementById('topic-' + w.topics[w.topics.length - 1]);
    const weekEl = document.getElementById('week-' + w.id);
    if (!firstTopic || !lastTopic || !weekEl) return;

    const colRect = topicsCol.getBoundingClientRect();
    const firstRect = firstTopic.getBoundingClientRect();
    const lastRect = lastTopic.getBoundingClientRect();

    const midY = (firstRect.top + lastRect.bottom) / 2;

    // Get brace height to span topics
    const spanPx = lastRect.bottom - firstRect.top;
    const brace = weekEl.querySelector('.week-brace');
    brace.style.fontSize = Math.max(spanPx * 0.95, 40) + 'px';
    brace.style.lineHeight = '1';
    brace.style.height = spanPx + 'px';
    brace.style.display = 'flex';
    brace.style.alignItems = 'center';
  });

  // Now position the week brackets vertically
  const weeksColRect = weeksCol.getBoundingClientRect();
  weeks.forEach(w => {
    const firstTopic = document.getElementById('topic-' + w.topics[0]);
    const lastTopic = document.getElementById('topic-' + w.topics[w.topics.length - 1]);
    const weekEl = document.getElementById('week-' + w.id);
    if (!firstTopic || !lastTopic) return;

    const firstRect = firstTopic.getBoundingClientRect();
    const lastRect = lastTopic.getBoundingClientRect();
    const midY = (firstRect.top + lastRect.bottom) / 2 - weeksColRect.top;

    weekEl.style.position = 'absolute';
    weekEl.style.top = (firstRect.top - weeksColRect.top) + 'px';
    weekEl.style.width = '100%';
  });

  weeksCol.style.height = (() => {
    const last = weeks[weeks.length - 1];
    const lastTopic = document.getElementById('topic-' + last.topics[last.topics.length - 1]);
    if (!lastTopic) return '600px';
    return (lastTopic.getBoundingClientRect().bottom - weeksCol.getBoundingClientRect().top + 40) + 'px';
  })();
}

window.addEventListener('resize', () => {
  drawLines();
  positionWeekCol();
});
</script>
